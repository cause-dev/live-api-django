<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% block title %}
        ApiVigil
      {% endblock %}
    </title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      /* Ensures the footer stays at the bottom of the page */
      body {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      main {
        flex: 1;
      }
      
      .htmx-indicator {
        display: none;
      }
      .htmx-request .htmx-indicator {
        display: inline-block;
      }
      .htmx-request.htmx-indicator {
        display: inline-block;
      }
      
      /* When any parent is processing an HTMX request, hide the refresh icon */
      .htmx-request .htmx-dis-element {
        display: none;
      }
    </style>
  </head>
  <body class="bg-base-200 text-base-content">
    {% include 'partials/header.html' %}

    <!-- MAIN CONTENT AREA -->
    <main class="container mx-auto p-4 md:p-8" id="main-content">
      <!-- This is where your child templates will inject their content -->
      {% block content %}
        # You can include breadcrumb here<div class="hero bg-base-100 rounded-box p-10 shadow-xl">
          <div class="hero-content text-center">
            <div class="max-w-md">
              <h1 class="text-5xl font-bold">Hello there</h1>
              <p class="py-6">Welcome to ApiVigil. This is the default base content.</p>
            </div>
          </div>
        </div>
      {% endblock %}
    </main>

    {% include 'partials/footer.html' %}
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
    <script>
      // This tells HTMX to include the CSRF token in the headers of every request
      document.body.addEventListener('htmx:configRequest', (event) => {
        event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}'
      })
      
      document.body.addEventListener('modalClose', () => {
        endpoint_modal.close()
      })
      document.body.addEventListener('htmx:afterSwap', function () {
        window.scrollTo(0, 0)
      })
    </script>
  </body>
</html>
