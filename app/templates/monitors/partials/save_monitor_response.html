<!-- monitors/partials/save_monitor_response.html -->

<!-- 1. The NEW row: We wrap it in a tbody to make it "legal" HTML -->
<table style="display:none">
  <!-- This tells HTMX: "Find #monitor-table-body on the page and put this row at the top" -->
  <tbody id="monitor-table-body" hx-swap-oob="afterbegin">
    {% include T.MONITORS.PARTIALS.ENDPOINTS.ROW with item=item %}
  </tbody>
</table>

<!-- 2. The updated stats (Make sure stats.html has hx-swap-oob="true") -->
{% include T.MONITORS.PARTIALS.STATS %}

<!-- 3. The Modal Message (The primary target of the form) -->
<div class="p-10 text-center">
  <div class="text-success font-bold text-xl mb-2">Endpoint Created!</div>
  <p class="text-sm opacity-50">Updating your dashboard...</p>
</div>
