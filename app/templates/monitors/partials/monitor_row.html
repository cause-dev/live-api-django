<tr id="monitor-row-{{ monitor.id }}" class="hover:bg-base-200/50 transition-colors">
  <td>
    <div class="flex flex-col">
      <span class="font-bold text-base">{{ monitor.name }}</span>
      <span class="text-xs opacity-50 font-mono">{{ monitor.url|truncatechars:40 }}</span>
    </div>
  </td>

  <td>
    <div class="badge badge-outline badge-sm">{{ monitor.expected_status_code }}</div>
  </td>

  <td>
    {% if not monitor.is_active %}
      <div class="badge badge-ghost gap-2">Paused</div>
    {% elif monitor.is_online %}
      <div class="badge badge-success gap-2">
        <span class="w-2 h-2 rounded-full bg-white animate-pulse"></span> Healthy
      </div>
    {% else %}
      <div class="badge badge-error gap-2">
        <span class="w-2 h-2 rounded-full bg-white"></span> Down
      </div>
    {% endif %}
  </td>

  <td class="text-sm">
    {% if monitor.last_checked %}
      {{ monitor.last_checked|timesince }} ago
    {% else %}
      <span class="italic opacity-30">Never</span>
    {% endif %}
  </td>

  <td class="text-right">
    <div class="flex justify-end items-center gap-2">
      <!-- CHECK NOW BUTTON -->
      <button hx-post="{% url 'monitor_check' monitor.id %}" hx-indicator="#check-spinner-{{ monitor.id }}" class="btn btn-ghost btn-xs tooltip" data-tip="Check Now">
        <!-- The Spinner (Hidden by default) -->
        <span id="check-spinner-{{ monitor.id }}" class="htmx-indicator loading loading-spinner loading-xs text-primary"></span>

        <!-- The Icon (Hidden while htmx is requesting) -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 htmx-dis-element" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
      </button>

      <!-- Dropdown -->
      <div class="dropdown dropdown-left">
        <div tabindex="0" role="button" class="btn btn-ghost btn-sm btn-square">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-5 h-5 stroke-current">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z"></path>
          </svg>
        </div>
        <ul tabindex="0" class="dropdown-content z-[1] menu p-2 shadow bg-base-100 rounded-box w-40 border border-base-300">
          <li>
            <button hx-get="{% url 'edit_api' monitor.id %}" hx-target="#edit_monitor_modal_content" onclick="edit_monitor_modal.showModal()">Edit</button>
          </li>
          <li>
            <button type="button" onclick="delete_modal_{{ monitor.id }}.showModal()" class="text-error">Delete</button>
          </li>
        </ul>
      </div>
    </div>

    <!-- Delete Modal (Keep as is) -->
    <dialog id="delete_modal_{{ monitor.id }}" class="modal">...</dialog>
  </td>
</tr>
