<form hx-post="{% url 'add_endpoint' %}" hx-target="#poll-container" hx-swap="innerHTML">
  {% csrf_token %}
  <div class="space-y-4">
    <div>
      <label class="label"><span class="label-text">Endpoint Name</span></label>
      {{ form.name }}
      {{ form.name.errors }}
    </div>
    <div>
      <label class="label"><span class="label-text">Target URL</span></label>
      {{ form.url }}
      {{ form.url.errors }}
    </div>
    <div class="flex gap-4">
      <div class="flex-1">
        <label class="label"><span class="label-text">Expected Status</span></label>
        {{ form.expected_status_code }}
      </div>
      <div class="flex flex-col items-center">
        <label class="label"><span class="label-text">Active?</span></label>
        {{ form.is_active }}
      </div>
    </div>
  </div>
  <div class="modal-action">
    <button type="submit" class="btn btn-primary">Save Monitor</button>
    <button type="button" onclick="add_endpoint_modal.close()" class="btn btn-ghost">Cancel</button>
  </div>
</form>
