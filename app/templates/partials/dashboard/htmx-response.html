<!-- 1. Messages Area (Toasts/Alerts) -->
<div id="dashboard-messages" class="w-full">
  {% if messages %}
    <div class="space-y-3 mb-6">
      {% for message in messages %}
        <div class="alert shadow-lg border-l-4 
            {% if message.tags == 'success' %}
            alert-success border-success
          {% elif message.tags == 'error' %}
            alert-error border-error
          {% else %}
            alert-info border-info
          {% endif %}"
          onclick="this.remove()">
          <!-- Click to dismiss -->
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="stroke-current shrink-0 w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <div class="flex-1">
            <span class="font-bold text-sm">{{ message }}</span>
          </div>
          <button class="btn btn-ghost btn-xs btn-circle">✕</button>
        </div>
      {% endfor %}
    </div>

    <!-- Optional: Auto-hide messages after 4 seconds -->
    <script>
      setTimeout(() => {
        document.getElementById('dashboard-messages').innerHTML = ''
      }, 4000)
    </script>
  {% endif %}
</div>

{% include T.MONITORS.PARTIALS.STATS %}

<!-- 2. The Table Section -->
<div class="card bg-base-100 border border-base-300 shadow-sm mt-8">
  <div class="p-6 pb-0">
    <h2 class="text-xl font-bold">Monitors Overview</h2>
  </div>
  <div class="overflow-x-auto p-4">
    <table class="table w-full">
      <thead>
        <tr class="text-base-content/50">
          <th>Name & URL</th>
          <th>Expected</th>
          <th>Status</th>
          <th>Last Checked</th>
          <th class="text-right">Actions</th>
        </tr>
      </thead>
      <tbody id="endpoint-table-body">
        {% include T.MONITORS.PARTIALS.ENDPOINTS.LIST with object_list=endpoints %}
      </tbody>
    </table>
  </div>
</div>
