<div id="stats-container" class="stats shadow bg-base-100 border border-base-300 w-full" {% if oob %}hx-swap-oob="true"{% endif %}>
  <div class="stat">
    <div class="stat-figure text-primary">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-8 h-8 stroke-current">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
    </div>
    <div class="stat-title">Total Monitors</div>
    <div class="stat-value text-primary">{{ total_count|default:0 }}</div>
    <div class="stat-desc">Active in your account</div>
  </div>

  <div class="stat">
    <div class="stat-figure text-success">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-8 h-8 stroke-current">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
      </svg>
    </div>
    <div class="stat-title">Online</div>
    <div class="stat-value text-success">{{ online_count|default:0 }}</div>
    <div class="stat-desc text-success">Responding correctly</div>
  </div>

  <div class="stat">
    <div class="stat-figure text-error">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-8 h-8 stroke-current">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
      </svg>
    </div>
    <div class="stat-title">Offline / Issues</div>
    <div class="stat-value text-error">{{ offline_count|default:0 }}</div>
    <div class="stat-desc text-error">Requires attention</div>
  </div>
</div>
