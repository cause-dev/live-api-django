<div class="space-y-8" id="poll-container" hx-get="{% url 'dashboard_poll' %}" hx-trigger="every 10s" hx-target="#poll-container" hx-swap="outerHTML">
  {% include T.MONITORS.PARTIALS.HEADER %}

  {% include T.MONITORS.PARTIALS.STATS %}

  <!-- 3. Table Section -->
  <div class="card bg-base-100 border border-base-300 shadow-sm">
    <div class="p-6 pb-0">
      <h2 class="text-xl font-bold">Monitors List</h2>
    </div>
    <div class="overflow-x-auto p-4">
      <table class="table w-full">
        <thead>
          <tr class="text-base-content/50">
            <th>Name & URL</th>
            <th>Expected</th>
            <th>Current Status</th>
            <th>Last Checked</th>
            <th class="text-right">Actions</th>
          </tr>
        </thead>
        <tbody id="monitor-table-body">
          {% include T.MONITORS.PARTIALS.ENDPOINTS.LIST %}
        </tbody>
      </table>
    </div>
  </div>
</div>
